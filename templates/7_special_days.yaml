category: "Special Days & Celebrations"
description: "Mark birthdays, milestones, and the moments worth remembering."
templates:
  - id: "past_memory"
    name: "Past Memory"
    purpose: "Save an old memory, like the day you were born, a first date, or a past wedding."
    icon_url_path: "/icons/hand_drawn/hand_drawn_wait_56x56.png"
    page_layout_type: "list"
    note: "It is never too late to write down an old memory."
    pages:
      - title: "The original event & date"
        content: ""
      - title: "Where it took place"
        content: ""
      - title: "What I remember most vividly"
        content: ""
      - title: "Looking back on it from today"
        content: ""

  - id: "my_birthday"
    name: "My Birthday"
    purpose: "Reflect on the year that passed and set hopes for the year ahead."
    icon_url_path: "/icons/hand_drawn/hand_drawn_birthday-cake_56x56.png"
    page_layout_type: "list"
    pages:
      - title: "How I feel turning this age"
        content: ""
      - title: "Where and how I celebrated"
        content: ""
      - title: "Lessons I'm taking with me"
        content: ""
      - title: "Hopes for the year ahead"
        content: ""

  - id: "anniversary"
    name: "Anniversary"
    purpose: "Reflect on a relationship or wedding anniversary."
    icon_url_path: "/icons/hand_drawn/hand_drawn_wedding-ring_56x56.png"
    page_layout_type: "list"
    pages:
      - title: "How many years together"
        content: ""
      - title: "Where we are right now"
        content: ""
      - title: "Favorite memory from this year"
        content: ""
      - title: "What I love about us"
        content: ""

  - id: "milestone_transition"
    name: "Milestone & Transition"
    purpose: "For graduations, new homes, career wins, or big life changes."
    icon_url_path: "/icons/hand_drawn/hand_drawn_trophy_56x56.png"
    page_layout_type: "list"
    note: "Use this to mark the closing of one chapter and the start of another."
    pages:
      - title: "The milestone or change"
        content: ""
      - title: "How I got here & who helped"
        content: ""
      - title: "What I will miss or leave behind"
        content: ""
