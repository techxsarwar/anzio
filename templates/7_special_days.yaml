        content: ""
      - title: "What I'm grateful for this season"
        content: ""

  - id: "in_loving_memory"
    name: "In Loving Memory"
    purpose: "A remembrance entry for a loved one who has passed away."
    icon_url_path: "/icons/hand_drawn/hand_drawn_angel_56x56.png"
