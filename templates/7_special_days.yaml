        content: ""

  - id: "celebrating_others"
    name: "Celebrating Others"
    purpose: "Capture memories for someone's birthday, a reunion, or a new baby."
    icon_url_path: "/icons/hand_drawn/hand_drawn_give_love_56x56.png"
    page_layout_type: "list"
    pages:
      - title: "Who we are celebrating"
        content: ""
      - title: "Where we gathered"
        content: ""
      - title: "Favorite moments together"
        content: ""
      - title: "My wishes for them"
        content: ""

  - id: "holiday_reflection"
    name: "Holiday & Festival"
    purpose: "For New Year, cultural festivals, or major holidays."
    icon_url_path: "/icons/hand_drawn/hand_drawn_calendar_check_56x56.png"
